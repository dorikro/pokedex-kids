name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Prepare standalone deployment package
        run: |
          # Copy static assets into standalone output
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/
          # Copy the Pokemon data file into standalone output
          cp -r data .next/standalone/

      - name: Zip artifact for deployment
        run: |
          cd .next/standalone
          zip -r ../../deploy.zip .

      - name: Login to Azure
        uses: azure/login@532459e3138f3ab0189daa4e18e090b3a0487604 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@02a81be1e6f0d47036e0f5d7e4a2c43e00e32a44 # v3.0.8
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: deploy.zip
