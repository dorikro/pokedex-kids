name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Prepare standalone deployment package
        run: |
          # Copy static assets into standalone output
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/
          # Copy the Pokemon data file into standalone output
          cp -r data .next/standalone/

      - name: Zip artifact for deployment
        run: |
          cd .next/standalone
          zip -r ../../deploy.zip .

      - name: Login to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F9E88AD1BA3F4E4E8061E26B6CFC7D3E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A24F7F9C9383493D8A6A261F76C961F1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C521EB58F4AD4F08BAADA26A0ABAE6F6 }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3.0.8
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: deploy.zip

      - name: Set startup command
        run: az webapp config set --resource-group demo-pokedex --name ${{ vars.AZURE_WEBAPP_NAME }} --startup-file "node server.js"
